name: Build UF2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run

      - name: Convert to UF2
        run: |
          pip install intelhex
          python -c "
          import urllib.request
          urllib.request.urlretrieve('https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2conv.py', 'uf2conv.py')
          "
          python uf2conv.py .pio/build/nicenano/firmware.hex -c -b 0x26000 -f 0xADA52840 -o firmware.uf2

      - name: Upload UF2
        uses: actions/upload-artifact@v4
        with:
          name: HeatPett-firmware
          path: firmware.uf2
